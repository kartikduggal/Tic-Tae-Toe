<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tae-Toe{KD}</title>
</head>
<link rel="stylesheet" href="style.css">
<body class="dark-mode">
<main>
    <h1>Tic Tac Toe</h1>
    <div class="scoreboard">
        <p>X Wins: <span id="x-score">0</span></p>
        <p>0 Wins: <span id="o-score">0</span></p>
        <p>Draws: <span id="draw-score">0</span></p>
    </div>
    <p id="turn-indicator">Current Turn : 0</p>
    <p id="msg"></p>
    <div class="container">
        <div class ="game">
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <button class="box"></button>
            <div id="win-line"></div>
        </div>
    </div>
    <button id="reset-btn">Reset Game</button>
    <button id="theme-btn">Light Mode</button>
</main>
<script src="script.js"></script>

</body>
</html>
